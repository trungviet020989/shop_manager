workflows:
  android-workflow:
    name: Build Android APK
    max_build_duration: 120
    environment:
      flutter: stable
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build APK with new Icon
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk